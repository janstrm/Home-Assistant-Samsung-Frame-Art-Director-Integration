name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint & pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Ruff
        run: ruff check custom_components
      - name: Pytest
        run: pytest
