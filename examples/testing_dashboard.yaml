# ==============================================================================
# 🧪 Samsung Frame Art Director — Testing Dashboard
# ==============================================================================
# A single view that surfaces EVERY entity and service so you can exercise the
# whole integration from one screen. Uses ONLY built-in Lovelace cards — no
# auto-entities / browser_mod / card-mod required.
#
# HOW TO USE
#   Settings → Dashboards → (your dashboard) → ⋮ → Edit → ⋮ → Raw configuration
#   editor, and paste this under `views:` (or create a new dashboard and paste
#   the whole thing).
#
# ⚠️ ENTITY PREFIX: these IDs assume your device's entity prefix is
#   `samsung_frame`. If yours differ (e.g. `65_the_frame_…`), do a find/replace
#   of `samsung_frame` → your prefix. Check Developer Tools → States, filter
#   "frame".
# ==============================================================================

views:
  - title: Frame — Test
    icon: mdi:test-tube
    cards:
      # --------------------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🖼️ Now Playing & Status"
          - type: picture-entity
            entity: image.samsung_frame_art_preview
            name: Art Preview
            show_state: false
            camera_view: live
          - type: entities
            entities:
              - entity: media_player.samsung_frame
                name: Art Mode (power toggle)
              - type: attribute
                entity: media_player.samsung_frame
                attribute: art_mode_status
                name: art_mode_status
              - type: attribute
                entity: media_player.samsung_frame
                attribute: content_id
                name: current content_id
              - type: attribute
                entity: media_player.samsung_frame
                attribute: connected
                name: connected
              - entity: sensor.samsung_frame_art_library
                name: Library items
          # Browse the Media Source library + "play to Frame" from here:
          - type: media-control
            entity: media_player.samsung_frame
          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                name: Art ON
                icon: mdi:projector-screen-outline
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.set_artmode
                  target: { entity_id: media_player.samsung_frame }
                  data: { enabled: true }
              - type: button
                name: Art OFF
                icon: mdi:projector-screen-off-outline
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.set_artmode
                  target: { entity_id: media_player.samsung_frame }
                  data: { enabled: false }

      # --------------------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 🎚️ Art-Mode Settings
              These write to the TV. Values populate after a restart with the
              TV on.
          - type: entities
            entities:
              - entity: number.samsung_frame_art_mode_brightness
                name: Brightness (0–10)
              - entity: number.samsung_frame_art_mode_color_temperature
                name: Color temperature (−5…5)
              - entity: switch.samsung_frame_auto_brightness
                name: Auto brightness (light sensor)
              - entity: number.samsung_frame_motion_sensitivity
                name: Motion sensitivity (1–3)
              - entity: select.samsung_frame_motion_timer
                name: Motion timer
          - type: markdown
            content: "## 🖼️ Matte (border)"
          - type: entities
            entities:
              - entity: select.samsung_frame_matte_style
                name: Matte style (none = off)
              - entity: select.samsung_frame_matte_color
                name: Matte color

      # --------------------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## 🔁 Rotation & Slideshow"
          - type: entities
            entities:
              - entity: switch.samsung_frame_slideshow_enabled
                name: Slideshow enabled
              - entity: select.samsung_frame_slideshow_source
                name: Slideshow source
              - entity: text.samsung_frame_slideshow_filter
                name: Filter (tags, '-tag' to exclude)
              - entity: number.samsung_frame_slideshow_interval
                name: Interval (min)
              - entity: switch.samsung_frame_gallery_favorites_only
                name: Favorites only
          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                name: Rotate now
                icon: mdi:shuffle-variant
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.rotate_art_now
                  target: { entity_id: media_player.samsung_frame }
              - type: button
                name: Rotate favorites
                icon: mdi:heart-multiple
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.rotate_favorites
                  target: { entity_id: media_player.samsung_frame }
              - type: button
                name: Favorite current
                icon: mdi:heart-plus
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.toggle_favorite
              - type: button
                name: Diagnostics → logs
                icon: mdi:stethoscope
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.art_diagnostics
                  target: { entity_id: media_player.samsung_frame }

      # --------------------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              ## 🗂️ Library & Maintenance
              Browse the library via the **media-control** card above → the
              browse (folder) icon → **Samsung Frame Art** → pick an image →
              *Play* to the Frame.
          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                name: Process Inbox
                icon: mdi:tray-arrow-down
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.process_inbox
              - type: button
                name: Sync Library
                icon: mdi:database-sync
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.sync_library
              - type: button
                name: Cleanup TV (dry run)
                icon: mdi:delete-sweep
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.cleanup_storage
                  target: { entity_id: media_player.samsung_frame }
                  data: { dry_run: true }
              - type: button
                name: Purge Database
                icon: mdi:database-remove
                tap_action:
                  action: perform-action
                  perform_action: samsung_frame_art_director.purge_database
                  confirmation:
                    text: "Wipe the local art DB + tags? Files are NOT deleted. Run Sync Library afterwards."
          - type: markdown
            content: >
              **Tracked:** {{ states('sensor.samsung_frame_art_library') }} ·
              **Top tags:** {{ state_attr('sensor.samsung_frame_art_library', 'top_tags') | join(', ') }}
