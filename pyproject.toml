[tool.ruff]
target-version = "py312"
line-length = 140

[tool.ruff.lint]
# Start conservative: pyflakes (unused imports, undefined names) — the
# high-value correctness checks. Style/import-order rules can be added later.
select = ["F"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-q"
testpaths = ["tests"]
